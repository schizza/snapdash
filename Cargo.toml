[package]
name = "snapdash"
version = "0.0.1"
edition = "2024"
authors = ["Lukáš Svoboda <opensource@schizza.cz"]
license = "Apache-2.0"
description = "A pluggable desktop widget system - Home Assistant today, anything tomorrow."
repository = "https://github.com/schizza/snapdash"
homepage = "https://snapdash.schizza.cz"
documentation = "https://github.com/schizza/snapdash#readme"
readme = "README.md"
keywords = ["widget", "dashboard", "home-assistant", "desktop", "gui"]
categories = ["gui", "visualisation", "rendering"]
rust-version = "1.94"

exclude = [
  "/.github/",
  "/.vscode/",
  "/.zed/",
  "/dist/",
  "/assets/screenshots/",
  "*.png",
  "*.gif",
  "mac_build.sh",
]

[features]
default = ["diagnostics"]
diagnostics = []

[dependencies]
anyhow = "1.0.100"
chrono = "0.4.42"
iced = { version = "0.14.0", features = ["wgpu", "tokio"] }
directories = "6.0.0"
keyring = { version = "3.6.3", features = [
  "apple-native",
  "windows-native",
  "sync-secret-service",
  "vendored",
] }
reqwest = { version = "0.12.25", features = [
  "json",
  "rustls-tls",
  "native-tls-vendored",
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = [
  "rt-multi-thread",
  "macros",
  "time",
  "fs",
] }
tokio-tungstenite = { version = "0.28.0", features = [
  "rustls-tls-webpki-roots",
] }
toml = "0.9.8"
url = "2.5.7"

[target.'cfg(target_os = "macos")'.dependencies]
objc2-quartz-core = "0.3.2"

[patch.crates-io]
iced = { git = "https://github.com/schizza/iced.git", tag = "snapdash-v0.14.0-p1" }
iced_winit = { git = "https://github.com/schizza/iced.git", tag = "snapdash-v0.14.0-p1" }
iced_runtime = { git = "https://github.com/schizza/iced.git", tag = "snapdash-v0.14.0-p1" }
iced_program = { git = "https://github.com/schizza/iced.git", tag = "snapdash-v0.14.0-p1" }
iced_renderer = { git = "https://github.com/schizza/iced.git", tag = "snapdash-v0.14.0-p1" }
iced_widget = { git = "https://github.com/schizza/iced.git", tag = "snapdash-v0.14.0-p1" }
iced_core = { git = "https://github.com/schizza/iced.git", tag = "snapdash-v0.14.0-p1" }

# iced_winit = { path = "vendor/iced/winit" }
# iced_runtime = { path = "vendor/iced/runtime" }
# iced_program = { path = "vendor/iced/program" }
# iced_renderer = { path = "vendor/iced/renderer" }
# iced_widget = { path = "vendor/iced/widget" }
# iced_core = { path = "vendor/iced/core" }

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
debug = 0
