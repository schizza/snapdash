name: Sync Labels

on:
  push:
    branches: [main, dev]
    paths:
      - ".github/labels.yml"
      - ".github/workflows/sync-labels.yml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          dry-run: false
          token: ${{ secrets.GITHUB_TOKEN }}
